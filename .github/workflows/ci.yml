name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        if: ${{ success() }}

      - name: Type-check
        run: npm run typecheck
        if: ${{ success() }}
        continue-on-error: true  # remove if project has strict typecheck script

      - name: Test
        run: npm test -- --run
        if: ${{ success() }}

      - name: Build
        run: npm run build
        if: ${{ success() }}
